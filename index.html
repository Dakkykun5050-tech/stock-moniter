<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CROSS SCANNER // 日本株</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:          #000000;
  --bg2:         #060810;
  --bg3:         #0a0d18;
  --bg4:         #0d1020;
  --neon:        #00cfff;
  --neon2:       #0099cc;
  --neon-dim:    rgba(0,207,255,0.10);
  --neon-glow:   0 0 12px #00cfff, 0 0 30px rgba(0,207,255,0.4);
  --neon-glow-s: 0 0 8px rgba(0,207,255,0.6);
  --gold:        #ffcc00;
  --gold-glow:   0 0 12px #ffcc00, 0 0 30px rgba(255,204,0,0.4);
  --green:       #00ff88;
  --green-glow:  0 0 10px rgba(0,255,136,0.5);
  --red:         #ff3355;
  --red-glow:    0 0 10px rgba(255,51,85,0.5);
  --white:       #ffffff;
  --off-white:   #ccddee;
  --gray:        #7799aa;
  --border:      rgba(0,207,255,0.20);
  --border2:     rgba(0,207,255,0.08);
  --mono:        'JetBrains Mono', monospace;
  --sans:        'Noto Sans JP', sans-serif;
  --r:           8px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
input, button { -webkit-appearance:none; appearance:none; }

body {
font-family: var(–sans);
background: var(–bg);
color: var(–white);
min-height: 100vh;
overflow-x: hidden;
}

/* 背景グリッド（薄い青） */
body::before {
content:’’;
position:fixed; inset:0; z-index:0; pointer-events:none;
background-image:
linear-gradient(rgba(0,207,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,207,255,0.04) 1px, transparent 1px);
background-size: 40px 40px;
}

/* ============ HEADER ============ */
header {
position: sticky; top:0; z-index:500;
background: rgba(0,0,0,0.96);
border-bottom: 1px solid var(–border);
padding: 0 20px;
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
}
.hdr {
max-width:1400px; margin:0 auto;
display:flex; align-items:center; justify-content:space-between;
gap:12px; flex-wrap:wrap; min-height:62px;
}

/* ロゴ */
.logo { display:flex; align-items:center; gap:12px; }
.logo-box {
width:42px; height:42px;
border: 1.5px solid var(–neon);
border-radius:6px;
display:flex; align-items:center; justify-content:center;
font-size:20px;
box-shadow: var(–neon-glow);
animation: box-pulse 3s ease-in-out infinite;
}
@keyframes box-pulse {
0%,100%{ box-shadow: var(–neon-glow-s); }
50%    { box-shadow: var(–neon-glow); }
}
.logo-title {
font-family: var(–mono); font-size:17px; font-weight:800;
color: var(–neon); letter-spacing:3px;
text-shadow: var(–neon-glow);
}
.logo-sub {
font-family: var(–mono); font-size:10px;
color: var(–gray); letter-spacing:2px; margin-top:3px;
}

/* ヘッダー右 */
.hdr-right { display:flex; align-items:center; gap:10px; }
.timer {
font-family:var(–mono); font-size:13px; font-weight:700;
background: var(–bg3);
border: 1px solid var(–border);
padding: 7px 14px; border-radius:6px;
color: var(–gray);
display:flex; align-items:center; gap:8px;
}
.timer-dot {
width:7px; height:7px; border-radius:50%;
background: var(–neon);
box-shadow: var(–neon-glow-s);
animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.timer span { color:var(–neon); font-weight:800; font-size:15px; }

/* ============ ボタン ============ */
.btn {
font-family: var(–mono); font-size:12px; font-weight:700;
border-radius:6px; padding:8px 16px; cursor:pointer;
transition:all 0.2s ease;
display:inline-flex; align-items:center; gap:6px;
letter-spacing:1px; border:none;
}
.btn-neon {
background: transparent; color: var(–neon);
border: 1.5px solid var(–neon);
}
.btn-neon:hover {
background: var(–neon-dim);
box-shadow: var(–neon-glow);
transform: translateY(-1px);
}
.btn-gold {
background: transparent; color: var(–gold);
border: 1.5px solid var(–gold);
}
.btn-gold:hover {
background: rgba(255,204,0,0.10);
box-shadow: var(–gold-glow);
transform: translateY(-1px);
}
.btn-gray {
background: transparent; color: var(–off-white);
border: 1px solid rgba(255,255,255,0.2);
}
.btn-gray:hover { border-color: var(–off-white); }
.btn-del {
background: transparent; color: var(–red);
border: 1px solid rgba(255,51,85,0.4);
padding:5px 10px; font-size:11px;
}
.btn-del:hover { background: rgba(255,51,85,0.10); box-shadow: var(–red-glow); }
.btn:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; }

/* ============ MAIN ============ */
main {
max-width:1400px; margin:0 auto;
padding:24px 16px;
position:relative; z-index:1;
}

/* ============ パネル ============ */
.panel {
background: var(–bg2);
border: 1px solid var(–border2);
border-radius: var(–r);
margin-bottom:18px;
overflow:hidden;
}
.panel-head {
display:flex; align-items:center; justify-content:space-between;
padding:13px 20px;
border-bottom: 1px solid var(–border2);
}
.panel-title {
font-family: var(–mono); font-size:11px; font-weight:800;
letter-spacing:3px; text-transform:uppercase;
display:flex; align-items:center; gap:8px;
}
.panel-title.neon  { color: var(–neon);  }
.panel-title.gold  { color: var(–gold);  }
.panel-title.green { color: var(–green); }
.panel-title::before {
content:’’; width:7px; height:7px; border-radius:50%;
background:currentColor; box-shadow:0 0 8px currentColor;
}
.panel-body { padding:18px 20px; }

/* ============ 銘柄追加 ============ */
.add-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
.inp-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:150px; max-width:230px; }
.inp-label {
font-family:var(–mono); font-size:10px; font-weight:700;
color: var(–off-white); letter-spacing:2px; text-transform:uppercase;
}
.code-input {
background: var(–bg4);
border: 1.5px solid rgba(0,207,255,0.25);
color: var(–neon);
font-family:var(–mono); font-size:24px; font-weight:800;
padding:10px 14px; border-radius:6px;
outline:none; width:100%;
letter-spacing:6px;
caret-color: var(–neon);
transition: border-color 0.2s, box-shadow 0.2s;
}
.code-input:focus {
border-color: var(–neon);
box-shadow: var(–neon-glow-s);
}
.code-input::placeholder {
color: rgba(0,207,255,0.25); font-size:16px; letter-spacing:2px;
}

.presets { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.pre-lbl { font-family:var(–mono); font-size:10px; color:var(–gray); align-self:center; letter-spacing:1px; }
.preset {
font-family:var(–mono); font-size:11px; font-weight:700;
background:transparent; border:1px solid rgba(0,207,255,0.18);
color: var(–off-white); padding:5px 11px; border-radius:5px;
cursor:pointer; transition:all 0.2s; letter-spacing:1px;
}
.preset:hover {
border-color:var(–neon); color:var(–neon);
box-shadow: 0 0 6px rgba(0,207,255,0.3);
}

/* ============ スクリーナー ============ */
.screen-desc {
font-size:13px; color:var(–off-white);
line-height:1.9; margin-bottom:16px;
}
.screen-desc strong { color:var(–gold); }

.sub-lbl {
font-family:var(–mono); font-size:10px; font-weight:700;
color:var(–gray); letter-spacing:3px; margin-bottom:9px;
text-transform:uppercase;
}

/* セクターボタン */
.sector-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.sec-btn {
font-family:var(–mono); font-size:11px; font-weight:700;
background:transparent; border:1px solid rgba(255,255,255,0.12);
color: var(–off-white); padding:6px 13px; border-radius:5px;
cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; white-space:nowrap;
}
.sec-btn:hover { border-color:var(–gold); color:var(–gold); }
.sec-btn.active {
background: rgba(255,204,0,0.10);
border-color:var(–gold); color:var(–gold);
box-shadow: 0 0 8px rgba(255,204,0,0.3);
}

/* 条件グリッド */
.cond-grid {
display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
gap:8px; margin-bottom:16px;
}
.cond-item {
background:var(–bg4); border:1px solid rgba(255,255,255,0.08);
border-radius:6px; padding:11px 14px;
cursor:pointer; transition:all 0.2s;
}
.cond-item:hover, .cond-item.active {
border-color:rgba(255,204,0,0.5);
background:rgba(255,204,0,0.05);
}
.cond-item input[type=checkbox] {
accent-color:var(–gold); margin-right:7px;
width:15px; height:15px; cursor:pointer; vertical-align:middle;
}
.cond-item label {
font-size:13px; font-weight:700;
color:var(–white); cursor:pointer; user-select:none;
}
.cond-sub {
font-size:11px; color:var(–gray);
margin-top:5px; padding-left:22px; line-height:1.5;
}

.scan-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.scan-count { font-family:var(–mono); font-size:11px; color:var(–gray); letter-spacing:1px; }

.prog { height:3px; background:var(–bg4); border-radius:2px; margin-top:12px; overflow:hidden; display:none; }
.prog-fill {
height:100%;
background:linear-gradient(90deg, var(–gold), #ff9900);
border-radius:2px; transition:width 0.3s ease; width:0%;
box-shadow: 0 0 8px rgba(255,204,0,0.6);
}
.scan-status { font-family:var(–mono); font-size:11px; color:var(–gray); margin-top:8px; letter-spacing:1px; }

.result-list { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.result-tag {
font-family:var(–mono); font-size:11px; font-weight:700;
background: rgba(255,204,0,0.07);
border: 1px solid rgba(255,204,0,0.40);
color:var(–gold); padding:5px 12px; border-radius:5px;
cursor:pointer; transition:all 0.2s;
display:flex; align-items:center; gap:7px;
}
.result-tag:hover {
background:rgba(255,204,0,0.15); transform:translateY(-1px);
box-shadow:0 0 8px rgba(255,204,0,0.3);
}

/* ============ レジェンド ============ */
.legend-grid {
display:grid;
grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
gap:8px;
}
.leg-row {
display:flex; align-items:flex-start; gap:10px;
background:var(–bg4); border:1px solid rgba(255,255,255,0.07);
border-radius:6px; padding:11px 13px;
}
.leg-row.hl { border-color:rgba(255,204,0,0.30); background:rgba(255,204,0,0.04); }
.leg-badge {
font-family:var(–mono); font-size:10px; font-weight:800;
padding:4px 9px; border-radius:4px; white-space:nowrap;
flex-shrink:0; letter-spacing:0.5px;
}
.leg-text { font-size:12px; color:var(–off-white); line-height:1.7; }
.leg-text strong { color:var(–white); font-weight:700; }

/* LINE */
.line-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.line-inp {
flex:1; min-width:200px;
background:var(–bg4); border:1px solid rgba(255,255,255,0.12);
color:var(–white); font-family:var(–mono); font-size:12px;
padding:9px 13px; border-radius:6px; outline:none;
transition:border-color 0.2s;
}
.line-inp:focus { border-color:#06c755; }
.btn-line {
background:transparent; color:#06c755;
border:1.5px solid #06c755;
border-radius:6px; padding:9px 16px;
font-family:var(–mono); font-size:12px; font-weight:700;
cursor:pointer; transition:all 0.2s; letter-spacing:1px;
}
.btn-line:hover { background:rgba(6,199,85,0.10); box-shadow:0 0 10px rgba(6,199,85,0.4); }

/* ============ 監視リスト ============ */
.watch-hdr {
display:flex; align-items:center; justify-content:space-between;
margin-bottom:16px;
}
.watch-title {
font-family:var(–mono); font-size:12px; font-weight:800;
color:var(–neon); letter-spacing:4px; text-transform:uppercase;
display:flex; align-items:center; gap:9px;
text-shadow: var(–neon-glow-s);
}
.watch-title::before {
content:’’; width:7px; height:7px; border-radius:50%;
background:var(–neon); box-shadow:var(–neon-glow-s);
}
.watch-badge {
font-family:var(–mono); font-size:11px; font-weight:700;
background:var(–neon-dim); border:1px solid var(–neon);
color:var(–neon); padding:4px 12px; border-radius:4px;
box-shadow:var(–neon-glow-s);
}

.cards-grid {
display:grid;
grid-template-columns:repeat(auto-fill, minmax(340px,1fr));
gap:14px;
}

/* ============ 銘柄カード ============ */
.card {
background: var(–bg2);
border: 1px solid rgba(0,207,255,0.12);
border-radius:var(–r);
overflow:hidden;
transition:border-color 0.25s, box-shadow 0.25s, transform 0.2s;
animation:cardIn 0.4s ease;
}
@keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.card:hover { transform:translateY(-3px); }
